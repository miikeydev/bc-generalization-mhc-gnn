common:
  device: auto
  data:
    train_graphs: 160
    val_graphs: 30
    test_graphs_id: 30
    test_graphs_ood: 30
    train_num_nodes: 100
    test_num_nodes: 500
    average_degree: 8
    train_families: [er, ba, sbm]
    ood_families: [ws, rgg]
    feature_mode: structural_only
    lap_pe_dim: 8
    random_feature_dim: 16
    bc_backend: networkit
    bc_mode: exact
    train_sign_flip_lappe: true
  training:
    epochs: 50
    batch_size: 4
    learning_rate: 0.001
    weight_decay: 0.00001
    ranking_pairs_per_node: 30
    patience: 10
  evaluation:
    topk_values: [10, 20, 50]
    topk_ratios: [0.01, 0.05]

models:
  gcn:
    experiment:
      name: gcn
    model:
      name: gcn
      hidden_dim: 128
      num_layers: 4
      dropout: 0.1

  gcn_residual:
    experiment:
      name: gcn_residual
    model:
      name: gcn_residual
      hidden_dim: 128
      num_layers: 4
      dropout: 0.1

  edgeconv:
    experiment:
      name: edgeconv
    model:
      name: edgeconv
      hidden_dim: 128
      num_layers: 4
      dropout: 0.1

  edgeconv_residual:
    experiment:
      name: edgeconv_residual
    model:
      name: edgeconv_residual
      hidden_dim: 128
      num_layers: 4
      dropout: 0.1

  sage:
    experiment:
      name: sage
    model:
      name: sage
      hidden_dim: 128
      num_layers: 4
      dropout: 0.1

  gat:
    experiment:
      name: gat
    model:
      name: gat
      hidden_dim: 128
      num_layers: 4
      dropout: 0.1
      num_heads: 4

  gin:
    experiment:
      name: gin
    model:
      name: gin
      hidden_dim: 128
      num_layers: 4
      dropout: 0.1

  gcnii:
    experiment:
      name: gcnii
    model:
      name: gcnii
      hidden_dim: 128
      num_layers: 16
      dropout: 0.1
      alpha: 0.1
      theta: 0.5

  appnp:
    experiment:
      name: appnp
    model:
      name: appnp
      hidden_dim: 128
      num_layers: 2
      dropout: 0.1
      alpha: 0.1
      K: 10

  jknet:
    experiment:
      name: jknet
    model:
      name: jknet
      hidden_dim: 128
      num_layers: 4
      dropout: 0.1
      mode: max

  hc_gcn:
    experiment:
      name: hc_gcn
    model:
      name: hc_gnn
      gnn_type: gcn
      hidden_dim: 128
      num_layers: 4
      dropout: 0.1
      n_streams: 4
      use_dynamic: true
      use_static: true
      mapping_init_alpha: 0.01
      sinkhorn_tau: 0.1
      sinkhorn_iters: 20

  hc_edgeconv:
    experiment:
