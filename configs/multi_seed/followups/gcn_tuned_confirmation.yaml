seeds: [0, 1, 2, 3, 4]

output_root: outputs/confirmations/gcn_tuned_confirmation

catalog: configs/multi_seed/catalog.yaml

trial_3_training: &trial_3_training
  epochs: 120
  patience: 20
  learning_rate: 0.00022639943735170472
  weight_decay: 0.000021019338091154404
  ranking_pairs_per_node: 30
  scheduler:
    name: reduce_on_plateau
    monitor: val_kendall
    mode: max
    factor: 0.5
    patience: 8
    min_lr: 0.00001

trial_3_model: &trial_3_model
  dropout: 0.1
  n_streams: 2
  sinkhorn_tau: 0.2
  sinkhorn_iters: 20
  mapping_init_alpha: 0.01

trial_5_training: &trial_5_training
  epochs: 120
  patience: 20
  learning_rate: 0.00034772754511277495
  weight_decay: 0.00021618261203953774
  ranking_pairs_per_node: 60
  scheduler:
    name: reduce_on_plateau
    monitor: val_kendall
    mode: max
    factor: 0.5
    patience: 8
    min_lr: 0.00001

trial_5_model: &trial_5_model
  dropout: 0.3
  n_streams: 2
  sinkhorn_tau: 0.2
  sinkhorn_iters: 10
  mapping_init_alpha: 0.01

trial_13_training: &trial_13_training
  epochs: 120
  patience: 20
  learning_rate: 0.000641862798951714
  weight_decay: 0.000031961811478297916
  ranking_pairs_per_node: 90
  scheduler:
    name: reduce_on_plateau
    monitor: val_kendall
    mode: max
    factor: 0.5
    patience: 8
    min_lr: 0.00001

trial_13_model: &trial_13_model
  dropout: 0.1
  n_streams: 2
  sinkhorn_tau: 0.05
  sinkhorn_iters: 10
  mapping_init_alpha: 0.02

experiments:
  - name: gcn_t3_l2
    model_id: gcn
    overrides:
      training: *trial_3_training
      model:
        <<: *trial_3_model
        num_layers: 2
  - name: mhc_gcn_t3_l2
    model_id: mhc_gcn
    overrides:
      training: *trial_3_training
      model:
        <<: *trial_3_model
        num_layers: 2
  - name: gcn_t3_l4
    model_id: gcn
    overrides:
