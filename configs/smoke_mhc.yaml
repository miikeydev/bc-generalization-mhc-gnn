experiment:
  name: smoke_mhc
  seed: 7
  output_dir: outputs/smoke_mhc

device: auto

data:
  train_graphs: 6
  val_graphs: 2
  test_graphs_id: 2
  test_graphs_ood: 2
  train_num_nodes: 40
  test_num_nodes: 80
  average_degree: 6
  train_families: [er, ba, sbm]
  ood_families: [ws, rgg]
  feature_mode: structural_only
  lap_pe_dim: 4
  random_feature_dim: 8
  bc_approximation_k: null
  train_sign_flip_lappe: true

model:
  name: mhc_gnn
  gnn_type: gcn
  hidden_dim: 32
  num_layers: 2
  dropout: 0.1
  n_streams: 2
  use_dynamic: true
  use_static: true
  mapping_init_alpha: 0.01
  sinkhorn_tau: 0.1
  sinkhorn_iters: 10

training:
  epochs: 3
  batch_size: 2
  learning_rate: 0.001
  weight_decay: 0.00001
  ranking_pairs_per_node: 10
  patience: 3

evaluation:
  topk_values: [5, 10]
  topk_ratios: [0.05]
