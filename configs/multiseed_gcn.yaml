experiment:
  name: multiseed_gcn
  output_dir: outputs/multiseed/gcn

device: auto

data:
  train_graphs: 80
  val_graphs: 20
  test_graphs_id: 20
  test_graphs_ood: 20
  train_num_nodes: 100
  test_num_nodes: 500
  average_degree: 8
  train_families: [er, ba, sbm]
  ood_families: [ws, rgg]
  feature_mode: structural_only
  lap_pe_dim: 8
  random_feature_dim: 16
  bc_approximation_k: null
  train_sign_flip_lappe: true

model:
  name: gcn
  hidden_dim: 128
  num_layers: 4
  dropout: 0.1

training:
  epochs: 50
  batch_size: 4
  learning_rate: 0.001
  weight_decay: 0.00001
  ranking_pairs_per_node: 30
  patience: 10

evaluation:
  topk_values: [10, 20, 50]
  topk_ratios: [0.01, 0.05]
